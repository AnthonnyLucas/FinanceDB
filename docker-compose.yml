version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: financedb_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: financeiro_pessoal
    ports:
      - "5432:5432"
    volumes:
      - ./financeiro_pessoal.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financeiro_pessoal"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: financedb_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@financedb.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  app:
    build: .
    container_name: financedb_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=financeiro_pessoal
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - JWT_SECRET=financedb_admin_8k3m9x2p7w_secret_2025
      - ADMIN_EMAIL=Admin_DB@gmail.com
      - ADMIN_PASSWORD=AdminDB123
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
